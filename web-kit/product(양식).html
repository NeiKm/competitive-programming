<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>상품 상세 · 텀블러 스토어</title>
  <meta name="description" content="학생들이 직접 구현할 상세 페이지" />
  <style>
    :root{ --text:#0f172a; --sub:#64748b; --border:rgba(2,6,23,.08) }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0; background:#ffffff; color:var(--text); font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif}
    .wrap{min-height:100%; display:flex; flex-direction:column}
    header{position:sticky; top:0; background:#ffffff; border-bottom:1px solid var(--border)}
    .container{max-width:960px; margin-inline:auto; padding:14px 20px}
    a{color:inherit; text-decoration:none}
    .breadcrumb{font-size:14px; color:var(--sub)}
    main{flex:1;}
    .placeholder{display:grid; place-items:center; height:70vh}
    .box{border:2px dashed #cbd5e1; border-radius:16px; padding:40px; text-align:center}
    .box h1{margin:0 0 6px}
    .box p{margin:0; color:var(--sub)}
    code{background:#f1f5f9; border:1px solid #e2e8f0; padding:2px 6px; border-radius:6px}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="container" style="display:flex; align-items:center; gap:12px">
        <a href="index.html" aria-label="홈으로">← 홈</a>
        <div style="margin-left:auto; font-weight:700">상품 상세 (빈 화면)</div>
      </div>
    </header>

    <main class="container">
      <nav class="breadcrumb">홈 / 상세</nav>
      <div class="placeholder">
        <div class="box">
          <h1>여기는 학생들이 만들 상세 페이지 영역입니다.</h1>
          <p>URL 예시: <code>product.html?id=emg-02</code></p>
          <p>JS로 <code>location.search</code>에서 <code>id</code>를 파싱해 API/JSON에서 상품 정보를 불러오세요.</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    // 간단한 예시: 쿼리스트링의 id 읽기
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    console.log('[상세페이지] 상품 ID:', id);
    // TODO: 학생 과제
    // 1) id로 상품 데이터 fetch
    // 2) 이미지/이름/가격/옵션/장바구니 버튼 등 UI 구성
    // 3) 뒤로가기 / 빵부스러기 네비게이션 개선
  </script>
</body>
</html>
