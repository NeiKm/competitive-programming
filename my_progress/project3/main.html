<!DOCTYPE html>
<html lang="kor">
<head>
	<meta charset="UTF=8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Youtube</title>
	<style>
		* {
			padding: 0px;
			margin: 0px;
		}
		:root {
			--bg-color: black;
		}
		body {
			background: var(--bg-color);
			color: white;
			align-items: center;
		}
		/* .header-content {
			space-between
		} */
		.header-content {
			align-items: center;
			display: flex;
			justify-content: space-evenly;
		}
		.header-menu {
			display: flex;
		}
		.header-logo {
			align-items: center;
			gap: 5px;
			font-size: 10px;
			padding: 8px;
			display:flex;
		}
		.header-logo h1 {
			font-weight: 600;
		}
		.header-logo img {
			width: 36px;
			height: 25px;
		}
		.menu-item {
			transform: translateX(-180px) rotate(90deg);
		}
	</style>
</head>
<body>
	<header>
		<div class="header-content">
			<div class="header-menu">
				<div class="menu-item" id="menu-item">
					<p>⨌</p>
				</div>
				<div class="header-logo">
					<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/09/YouTube_full-color_icon_%282017%29.svg/3840px-YouTube_full-color_icon_%282017%29.svg.png">
					<h1>YouTube</h1>
				</div>
			</div>
				<div class="serch-box">
					<input type="text" placeholder="섹세요">
				</div>
		</div>
	</header>

	</script>
</body>
</html>
