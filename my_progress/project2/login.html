<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <section class="login-section">
        <div class="login-box">
            <div class="login-header">
                <p>로그인</p>
            </div>
            <div class="login-writ-section">
                <div class="write-email">
                    <input id="input_name" type="text" placeholder="이름">
                </div>
                <div class="write-password">
                    <input id="input_password" type="text" placeholder="비밀번호">
                </div>
            </div>
            <div class="send-btn">
                <button class="send-btn-btn" id="send-btn">화긴</button>
            </div>
        </div>
    </section>
    <script src="login.js"></script>
</body>
</html>
